# ── Real client IP ───────────────────────────────────────────────────────────
# nginx sits behind Dokploy/Traefik. Derive the real client IP from the
# forwarded header so rate-limit buckets and access logs reflect actual clients.
# nginx itself is only reachable via the trusted upstream proxy.
real_ip_header X-Forwarded-For;
set_real_ip_from 0.0.0.0/0;
real_ip_recursive on;

# ── Edge rate limiting (http context) ────────────────────────────────────────
# Coarse per-client backstop. App-level limits still apply on auth/payments/
# safety; this also covers discover/chat/profile which have no app-level limiter.
# Limits are generous so legitimate users never hit them.
limit_req_zone  $binary_remote_addr  zone=general:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=auth:10m     rate=5r/s;
limit_req_status 429;

server {
    # Unprivileged nginx image listens on 8080 (non-root cannot bind <1024).
    listen 8080;
    server_name _;

    # Upload size cap — matches auth-bff bodyLimit (base64 photo ≈ 13 MB).
    client_max_body_size 16m;

    # ── Security headers (applied to all responses) ──────────────────────────
    # NOTE: add_header is NOT inherited by a location that sets its own
    # add_header — the static-asset block below repeats the critical ones.
    add_header X-Frame-Options              "DENY" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy           "geolocation=(self), camera=(self), microphone=()" always;
    # CSP tuned for a Vite/React SPA calling same-origin APIs via this proxy.
    # Tighten/relax after verifying the app loads (esp. if you add 3rd-party SDKs).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    # Common proxy headers — applied to all proxy_pass blocks below
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # ── Auth BFF  (auth, profiles, onboarding, location, presence) ──────────
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    location /profiles/ {
        limit_req zone=general burst=40 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    location /onboarding/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    # Exact match needed — /api/ could collide with other services
    location = /api/location {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    location /api/presence/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    location /api/push/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://auth-bff:8787;
    }

    # ── Discover service  (/discover/*) ─────────────────────────────────────
    location /discover/ {
        limit_req zone=general burst=60 nodelay;
        proxy_pass http://discover-service:8788;
    }

    # ── Chat service  (/chat/*) ──────────────────────────────────────────────
    location /chat/ {
        limit_req zone=general burst=60 nodelay;
        # WebSocket upgrade support for real-time messaging
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://chat-service:4023;
    }

    # ── Profile service  (/profile-api/* → /*)  ─────────────────────────────
    # Prefixed to avoid collision with auth-bff's /profiles/ routes.
    # Frontend: set VITE_PROFILE_API_URL=https://your-domain.com/profile-api
    location /profile-api/ {
        limit_req zone=general burst=40 nodelay;
        rewrite ^/profile-api/(.*)$ /$1 break;
        proxy_pass http://profile-service:4022;
    }

    # ── Safety service  (/safety/*) ─────────────────────────────────────────
    location /safety/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://safety-service:4024;
    }

    # ── Payments service  (/payments/*, /entitlements/*) ────────────────────
    location /payments/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://payments-service:4025;
    }

    location /entitlements/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://payments-service:4025;
    }

    # ── Service worker + manifest: never long-cache (updates must propagate) ─
    # Must precede the generic *.js rule below (first matching regex wins).
    location ~* ^/(sw\.js|registerSW\.js|workbox-.*\.js|push-sw\.js|manifest\.webmanifest)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Static asset caching (must repeat security headers — own add_header) ─
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    # ── Frontend SPA (catch-all) ─────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
